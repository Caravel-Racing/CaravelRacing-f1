<!doctype html>
<html lang="pt-PT">

<head>
  <link rel="preload" href="/fonts/SpeedDemon.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/SpeedDemon.ttf" as="font" type="font/truetype" crossorigin>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>Caravel Racing — Team Photo</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/equipa-foto.css">
</head>

<body>
  <script src="js/header.js"></script>

  <main class="container">
    <section class="hero" aria-labelledby="hero-title">
      <h2 id="hero-title" style="margin:0 0 .25rem;color:var(--accent);font-size:1.6rem;">
        Interactive Team Photo
      </h2>
    </section>

    <div class="photo-wrap" id="photoWrap">
      <img src="images/group.png" alt="group" class="base-photo">

      <img src="images/diogobg.png" alt="Diogo" id="diogoCutout" class="cutout" crossorigin="anonymous"
        data-page="members/info.html#diogo" tabindex="0">

      <img src="images/martimbg.png" alt="Martim" id="martimCutout" class="cutout" crossorigin="anonymous"
        data-page="members/info.html#martim" tabindex="0">

      <img src="images/marianabg.png" alt="Mariana" id="marianaCutout" class="cutout" crossorigin="anonymous"
        data-page="members/info.html#mariana" tabindex="0">

      <img src="images/ferreirabg.png" alt="Ferreira" id="ferreiraCutout" class="cutout" crossorigin="anonymous"
        data-page="members/info.html#ferreira" tabindex="0">

      <img src="images/pedrobg.png" alt="Pedro" id="pedroCutout" class="cutout" crossorigin="anonymous"
        data-page="members/info.html#pedro" tabindex="0">

      <img src="images/franciscobg.png" alt="Francisco" id="franciscoCutout" class="cutout" crossorigin="anonymous"
        data-page="members/info.html#francisco" tabindex="0">
    </div>
  </main>

  <footer class="site-footer">
    <div class="container"
      style="display:flex;flex-wrap:wrap;gap:1rem;align-items:center;justify-content:space-between;">
      <div>
        <p style="margin:0">© Caravel Racing — Portugal</p>
        <p style="margin:0;font-size:.9rem;color:#9a9a9a;">Contact: <a
            href="mailto:caravelracing@gmail.com">caravelracing@gmail.com</a></p>
      </div>

      <div class="footer-sponsors" aria-label="Sponsors">
        <a href="https://www.manuport-logistics.com/" target="_blank" rel="noopener noreferrer" aria-label="Sponsor One">
          <img src="images/manuport.png" alt="manuport-logistics">
        </a>
        <a href="https://www.aoficinagondomar.pt/" target="_blank" rel="noopener noreferrer" aria-label="Sponsor Two">
          <img src="images/aoficina.png" alt="a-oficina">
        </a>
        <a href="https://www.gondoonda.pt/" target="_blank" rel="noopener noreferrer" aria-label="Sponsor Three">
          <img src="images/gondoonda.png" alt="gondoonda">
        </a>
        <a href="https://cstransitarios.pt/" target="_blank" rel="noopener noreferrer" aria-label="Sponsor Four">
          <img src="images/cstransitarios.png" alt="cstransitarios">
        </a>
        <a href="https://www.tintaspontereal.pt/" target="_blank" rel="noopener noreferrer" aria-label="Sponsor Five">
          <img src="images/tintaspontereal.png" alt="tintaspontereal">
        </a>
        <a href="https://cacao.pt/" target="_blank" rel="noopener noreferrer" aria-label="Sponsor Six">
          <img src="images/cacao.png" alt="cacao-civil-engineering">
        </a>
        <a href="https://areus.pt/" target="_blank" rel="noopener noreferrer" aria-label="Sponsor Seven">
          <img src="images/areus.png" alt="areus">
        </a>
      </div>

      <div style="display:flex;">
        <div class="mobile-socials" aria-label="Social links">
          <a href="https://instagram.com/caravelracing" target="_blank" rel="noopener noreferrer"
            class="mobile-social-link" aria-label="Caravel Racing on Instagram">
            <img src="images/instagram.png" alt="" aria-hidden="true" />
          </a>
          <a href="https://www.linkedin.com/in/caravel-racing-387b613a8" target="_blank" rel="noopener noreferrer"
            class="mobile-social-link" aria-label="Caravel Racing LinkedIn">
            <img src="images/linkedin.png" alt="" aria-hidden="true" />
          </a>
        </div>
      </div>
    </div>
  </footer>
</body>
<script src="js/header-dropdown.js" defer></script>
<script src="js/lang.js" defer></script>
<script src="js/langbutton.js" defer></script>
<script src="js/mobile-menu.js" defer></script>
<script src="js/groupimage.js" defer></script>

</html>
